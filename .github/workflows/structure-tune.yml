name: structure-tune-from-new-baseline

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "YYYY-MM-DD"
        required: true
        default: "2000-01-01"
      end_date:
        description: "YYYY-MM-DD or latest"
        required: true
        default: "latest"
      execution_mode:
        description: "mode1 or mode2"
        required: true
        default: "mode2"
      buy_cost:
        description: "buy cost fraction"
        required: true
        default: "0.0020"
      sell_cost:
        description: "sell cost fraction"
        required: true
        default: "0.0020"

concurrency:
  group: structure-tune-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate repo layout
        run: |
          test -f scripts/download_prices.py
          test -f scripts/run_grid_shard.py
          test -f scripts/aggregate_results.py
          test -f config/final_meta_baseline_fixed.yml
          test -f config/final_branch_baseline_fixed.yml

      - name: Download prices
        run: |
          mkdir -p data
          python scripts/download_prices.py \
            --start-date "${{ inputs.start_date }}" \
            --end-date "${{ inputs.end_date }}" \
            --out-csv data/prices.csv

      - uses: actions/upload-artifact@v4
        with:
          name: prices-${{ github.run_id }}
          if-no-files-found: error
          compression-level: 0
          path: data/prices.csv

  run-meta:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}

    strategy:
      fail-fast: false
      matrix:
        shard_idx: [0, 1]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - uses: actions/download-artifact@v4
        with:
          name: prices-${{ github.run_id }}
          path: data

      - name: Run meta shard
        run: |
          mkdir -p out
          python scripts/run_grid_shard.py \
            --engine meta \
            --grid-yaml config/final_meta_baseline_fixed.yml \
            --prices-csv data/prices.csv \
            --start-date "${{ inputs.start_date }}" \
            --end-date "${{ inputs.end_date }}" \
            --execution-mode "${{ inputs.execution_mode }}" \
            --buy-cost "${{ inputs.buy_cost }}" \
            --sell-cost "${{ inputs.sell_cost }}" \
            --shard-idx "${{ matrix.shard_idx }}" \
            --shard-count 2 \
            --out-csv "out/grid_meta_shard_${{ matrix.shard_idx }}.csv"

      - uses: actions/upload-artifact@v4
        with:
          name: shard-meta-${{ matrix.shard_idx }}-${{ github.run_id }}
          if-no-files-found: error
          compression-level: 0
          path: |
            out/grid_meta_shard_${{ matrix.shard_idx }}.csv
            out/grid_meta_shard_${{ matrix.shard_idx }}.json

  run-branch:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - uses: actions/download-artifact@v4
        with:
          name: prices-${{ github.run_id }}
          path: data

      - name: Run fixed branch
        run: |
          mkdir -p out
          python scripts/run_grid_shard.py \
            --engine branch5a \
            --grid-yaml config/final_branch_baseline_fixed.yml \
            --prices-csv data/prices.csv \
            --start-date "${{ inputs.start_date }}" \
            --end-date "${{ inputs.end_date }}" \
            --execution-mode "${{ inputs.execution_mode }}" \
            --buy-cost "${{ inputs.buy_cost }}" \
            --sell-cost "${{ inputs.sell_cost }}" \
            --shard-idx 0 \
            --shard-count 1 \
            --out-csv out/grid_branch5a_shard_0.csv

      - uses: actions/upload-artifact@v4
        with:
          name: shard-branch5a-0-${{ github.run_id }}
          if-no-files-found: error
          compression-level: 0
          path: |
            out/grid_branch5a_shard_0.csv
            out/grid_branch5a_shard_0.json

  aggregate:
    needs: [run-meta, run-branch]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - uses: actions/download-artifact@v4
        with:
          name: shard-meta-0-${{ github.run_id }}
          path: artifacts/meta0

      - uses: actions/download-artifact@v4
        with:
          name: shard-meta-1-${{ github.run_id }}
          path: artifacts/meta1

      - uses: actions/download-artifact@v4
        with:
          name: shard-branch5a-0-${{ github.run_id }}
          path: artifacts/branch

      - uses: actions/download-artifact@v4
        with:
          name: prices-${{ github.run_id }}
          path: data

      - name: Aggregate recovery-boost test
        run: |
          mkdir -p out/aggregate

          python scripts/aggregate_results.py \
            --input-dir artifacts \
            --out-dir out/aggregate \
            --prices-csv data/prices.csv \
            --meta-grid-yaml config/final_meta_baseline_fixed.yml \
            --branch-grid-yaml config/final_branch_baseline_fixed.yml \
            --execution-mode "${{ inputs.execution_mode }}" \
            --buy-cost "${{ inputs.buy_cost }}" \
            --sell-cost "${{ inputs.sell_cost }}" \
            --hybrid-core-weight "0.65" \
            --hybrid-satellite-weight "0.35" \
            --hybrid-meta-topn "7" \
            --hybrid-branch-topn "1" \
            --hybrid-rebalance-modes "always" \
            --hybrid-override-modes "meta_bear_crash_full" \
            --hybrid-vol-enabled "false" \
            --hybrid-vol-lookback-days "20" \
            --hybrid-vol-target-annual-vol "0.55" \
            --hybrid-vol-min-scale "0.35" \
            --hybrid-vol-cash-asset "SGOV_MIX" \
            --hybrid-vol-annualization "252"

      - uses: actions/upload-artifact@v4
        with:
          name: aggregate-${{ github.run_id }}
          if-no-files-found: error
          compression-level: 0
          path: out/aggregate/