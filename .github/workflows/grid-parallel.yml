name: grid-parallel-meta-branch5a-safe-recent10y

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "YYYY-MM-DD"
        required: true
        default: "2010-01-01"
      end_date:
        description: "YYYY-MM-DD or latest"
        required: true
        default: "latest"
      execution_mode:
        description: "mode1 or mode2"
        required: true
        default: "mode1"
      buy_cost:
        description: "buy cost fraction"
        required: true
        default: "0.0020"
      sell_cost:
        description: "sell cost fraction"
        required: true
        default: "0.0020"
      shard_count:
        description: "parallel shards to use (1-8 recommended)"
        required: true
        default: "8"
      max_parallel:
        description: "max concurrent shard jobs (1-4 recommended)"
        required: true
        default: "4"
      meta_grid_yaml:
        description: "meta grid yaml path"
        required: true
        default: "config/grid_meta.yml"
      branch_grid_yaml:
        description: "branch5a grid yaml path"
        required: true
        default: "config/grid_branch5a.yml"
      hybrid_core_weight:
        description: "hybrid core weight"
        required: true
        default: "0.70"
      hybrid_satellite_weight:
        description: "hybrid satellite weight"
        required: true
        default: "0.30"

concurrency:
  group: grid-safe-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}
    outputs:
      shard_count: ${{ steps.shard_plan.outputs.shard_count }}
      max_parallel: ${{ steps.shard_plan.outputs.max_parallel }}
      shard_matrix: ${{ steps.shard_plan.outputs.shard_matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate repo layout
        run: |
          test -f scripts/download_prices.py
          test -f scripts/run_grid_shard.py
          test -f scripts/aggregate_results.py
          test -f src/__init__.py
          test -f src/core/execution.py
          test -f src/core/grid.py
          test -f src/core/metrics.py
          test -f src/core/state.py
          test -f src/engines/meta.py
          test -f src/engines/branch5a.py
          test -f "${{ inputs.meta_grid_yaml }}"
          test -f "${{ inputs.branch_grid_yaml }}"

      - name: Compute shard plan
        id: shard_plan
        env:
          INPUT_SHARD_COUNT: ${{ inputs.shard_count }}
          INPUT_MAX_PARALLEL: ${{ inputs.max_parallel }}
        run: |
          count="${INPUT_SHARD_COUNT}"
          mp="${INPUT_MAX_PARALLEL}"

          if [ "$count" -lt 1 ] || [ "$count" -gt 8 ]; then
            echo "shard_count must be between 1 and 8"
            exit 1
          fi

          if [ "$mp" -lt 1 ] || [ "$mp" -gt 4 ]; then
            echo "max_parallel must be between 1 and 4"
            exit 1
          fi

          if [ "$mp" -gt "$count" ]; then
            mp="$count"
          fi

          echo "shard_count=$count" >> "$GITHUB_OUTPUT"
          echo "max_parallel=$mp" >> "$GITHUB_OUTPUT"
          echo "shard_matrix={\"engine\":[\"meta\",\"branch5a\"],\"shard_idx\":[$(seq -s, 0 $((count-1)))]}" >> "$GITHUB_OUTPUT"

          echo "Computed shard plan:"
          echo "  shard_count=$count"
          echo "  max_parallel=$mp"
          echo "  shard_matrix={\"engine\":[\"meta\",\"branch5a\"],\"shard_idx\":[$(seq -s, 0 $((count-1)))]}"

      - name: Download prices
        run: |
          mkdir -p data
          python scripts/download_prices.py \
            --start-date "${{ inputs.start_date }}" \
            --end-date "${{ inputs.end_date }}" \
            --out-csv data/prices.csv

      - name: Upload price artifact
        uses: actions/upload-artifact@v4
        with:
          name: prices-${{ github.run_id }}
          if-no-files-found: error
          compression-level: 0
          path: data/prices.csv

  run-shards:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}

    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(needs.prepare.outputs.max_parallel) }}
      matrix: ${{ fromJson(needs.prepare.outputs.shard_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download price artifact
        uses: actions/download-artifact@v4
        with:
          name: prices-${{ github.run_id }}
          path: data

      - name: Run shard
        run: |
          if [ "${{ matrix.engine }}" = "meta" ]; then
            GRID_YAML="${{ inputs.meta_grid_yaml }}"
          else
            GRID_YAML="${{ inputs.branch_grid_yaml }}"
          fi

          mkdir -p out

          python scripts/run_grid_shard.py \
            --engine "${{ matrix.engine }}" \
            --grid-yaml "$GRID_YAML" \
            --prices-csv data/prices.csv \
            --start-date "${{ inputs.start_date }}" \
            --end-date "${{ inputs.end_date }}" \
            --execution-mode "${{ inputs.execution_mode }}" \
            --buy-cost "${{ inputs.buy_cost }}" \
            --sell-cost "${{ inputs.sell_cost }}" \
            --shard-idx "${{ matrix.shard_idx }}" \
            --shard-count "${{ needs.prepare.outputs.shard_count }}" \
            --out-csv "out/grid_${{ matrix.engine }}_shard_${{ matrix.shard_idx }}.csv"

      - name: Upload shard artifact
        uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.engine }}-${{ matrix.shard_idx }}-${{ github.run_id }}
          if-no-files-found: error
          compression-level: 0
          path: |
            out/grid_${{ matrix.engine }}_shard_${{ matrix.shard_idx }}.csv
            out/grid_${{ matrix.engine }}_shard_${{ matrix.shard_idx }}.json

  aggregate:
    needs: run-shards
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Patch aggregate selection basis to recent10y_cagr
        run: |
          python -c "from pathlib import Path; p=Path('scripts/aggregate_results.py'); s=p.read_text(encoding='utf-8'); s=s.replace('''    meta_rows = meta_rows.sort_values([\"selection_score\", \"cagr\", \"mdd\"], ascending=[False, False, False]).reset_index(drop=True)\n    branch_rows = branch_rows.sort_values([\"selection_score\", \"cagr\", \"mdd\"], ascending=[False, False, False]).reset_index(drop=True)\n''','''    if \"recent10y_selection_score\" not in all_df.columns:\n        all_df[\"recent10y_selection_score\"] = all_df.apply(\n            lambda r: compute_selection_score(r[\"recent10y_cagr\"], r[\"recent10y_mdd\"], int(r.get(\"recent10y_max_recovery_days\", 0))),\n            axis=1,\n        )\n\n    meta_rows = meta_rows.sort_values(\n        [\"recent10y_cagr\", \"recent10y_selection_score\", \"recent10y_mdd\", \"cagr\"],\n        ascending=[False, False, False, False],\n    ).reset_index(drop=True)\n    branch_rows = branch_rows.sort_values(\n        [\"recent10y_cagr\", \"recent10y_selection_score\", \"recent10y_mdd\", \"cagr\"],\n        ascending=[False, False, False, False],\n    ).reset_index(drop=True)\n'''); s=s.replace('''    top50_by_score = (\n        all_df.sort_values([\"engine\", \"selection_score\", \"cagr\", \"mdd\"], ascending=[True, False, False, False])\n        .groupby(\"engine\", as_index=False)\n        .head(50)\n    )\n    top50_by_cagr = (\n        all_df.sort_values([\"engine\", \"cagr\", \"mdd\"], ascending=[True, False, False])\n        .groupby(\"engine\", as_index=False)\n        .head(50)\n    )\n    top50_by_mdd = (\n        all_df.sort_values([\"engine\", \"mdd\", \"cagr\"], ascending=[True, False, False])\n        .groupby(\"engine\", as_index=False)\n        .head(50)\n    )\n    top50_by_score.to_csv(out_dir / \"top50_by_score.csv\", index=False)\n    top50_by_cagr.to_csv(out_dir / \"top50_by_cagr.csv\", index=False)\n    top50_by_mdd.to_csv(out_dir / \"top50_by_mdd.csv\", index=False)\n''','''    top50_by_score = (\n        all_df.sort_values([\"engine\", \"selection_score\", \"cagr\", \"mdd\"], ascending=[True, False, False, False])\n        .groupby(\"engine\", as_index=False)\n        .head(50)\n    )\n    top50_by_cagr = (\n        all_df.sort_values([\"engine\", \"cagr\", \"mdd\"], ascending=[True, False, False])\n        .groupby(\"engine\", as_index=False)\n        .head(50)\n    )\n    top50_by_recent10y_cagr = (\n        all_df.sort_values([\"engine\", \"recent10y_cagr\", \"recent10y_selection_score\", \"recent10y_mdd\", \"cagr\"], ascending=[True, False, False, False, False])\n        .groupby(\"engine\", as_index=False)\n        .head(50)\n    )\n    top50_by_mdd = (\n        all_df.sort_values([\"engine\", \"mdd\", \"cagr\"], ascending=[True, False, False])\n        .groupby(\"engine\", as_index=False)\n        .head(50)\n    )\n    top50_by_score.to_csv(out_dir / \"top50_by_score.csv\", index=False)\n    top50_by_cagr.to_csv(out_dir / \"top50_by_cagr.csv\", index=False)\n    top50_by_recent10y_cagr.to_csv(out_dir / \"top50_by_recent10y_cagr.csv\", index=False)\n    top50_by_mdd.to_csv(out_dir / \"top50_by_mdd.csv\", index=False)\n'''); s=s.replace('''                    if (row[\"selection_score\"], row[\"cagr\"], row[\"mdd\"]) > (best_row[\"selection_score\"], best_row[\"cagr\"], best_row[\"mdd\"]):\n                        best_payload = (hybrid_equity, hybrid_targets, row, meta_result, branch_result)\n''','''                    if (\n                        row[\"recent10y_cagr\"],\n                        row[\"recent10y_selection_score\"],\n                        row[\"recent10y_mdd\"],\n                        row[\"cagr\"],\n                    ) > (\n                        best_row[\"recent10y_cagr\"],\n                        best_row[\"recent10y_selection_score\"],\n                        best_row[\"recent10y_mdd\"],\n                        best_row[\"cagr\"],\n                    ):\n                        best_payload = (hybrid_equity, hybrid_targets, row, meta_result, branch_result)\n'''); s=s.replace('''                    f\"score={row['selection_score']:.6f} cagr={row['cagr']:.6f} mdd={row['mdd']:.6f}\"\n''','''                    f\"recent10y_cagr={row['recent10y_cagr']:.6f} \"\n                    f\"recent10y_score={row['recent10y_selection_score']:.6f} \"\n                    f\"cagr={row['cagr']:.6f} mdd={row['mdd']:.6f}\"\n'''); s=s.replace('''    hybrid_candidates = pd.DataFrame(hybrid_rows).sort_values([\"selection_score\", \"cagr\", \"mdd\"], ascending=[False, False, False]).reset_index(drop=True)\n''','''    hybrid_candidates = pd.DataFrame(hybrid_rows).sort_values(\n        [\"recent10y_cagr\", \"recent10y_selection_score\", \"recent10y_mdd\", \"cagr\"],\n        ascending=[False, False, False, False],\n    ).reset_index(drop=True)\n'''); s=s.replace('''        {\n            \"engine\": \"meta\",\n            \"rows\": int(len(meta_rows)),\n            \"best_score\": float(meta_rows.iloc[0][\"selection_score\"]),\n            \"best_cagr\": float(meta_rows.iloc[0][\"cagr\"]),\n            \"best_mdd\": float(meta_rows.iloc[0][\"mdd\"]),\n            \"worst_mdd\": float(meta_rows[\"mdd\"].min()),\n        },\n        {\n            \"engine\": \"branch5a\",\n            \"rows\": int(len(branch_rows)),\n            \"best_score\": float(branch_rows.iloc[0][\"selection_score\"]),\n            \"best_cagr\": float(branch_rows.iloc[0][\"cagr\"]),\n            \"best_mdd\": float(branch_rows.iloc[0][\"mdd\"]),\n            \"worst_mdd\": float(branch_rows[\"mdd\"].min()),\n        },\n        {\n            \"engine\": hybrid_name,\n            \"rows\": int(len(hybrid_candidates)),\n            \"best_score\": float(best_hybrid_row[\"selection_score\"]),\n            \"best_cagr\": float(best_hybrid_row[\"cagr\"]),\n            \"best_mdd\": float(best_hybrid_row[\"mdd\"]),\n            \"worst_mdd\": float(hybrid_candidates[\"mdd\"].min()),\n        },\n''','''        {\n            \"engine\": \"meta\",\n            \"rows\": int(len(meta_rows)),\n            \"selection_basis\": \"recent10y_cagr\",\n            \"best_score\": float(meta_rows.iloc[0][\"selection_score\"]),\n            \"best_recent10y_score\": float(meta_rows.iloc[0][\"recent10y_selection_score\"]),\n            \"best_recent10y_cagr\": float(meta_rows.iloc[0][\"recent10y_cagr\"]),\n            \"best_recent10y_mdd\": float(meta_rows.iloc[0][\"recent10y_mdd\"]),\n            \"best_cagr\": float(meta_rows.iloc[0][\"cagr\"]),\n            \"best_mdd\": float(meta_rows.iloc[0][\"mdd\"]),\n            \"worst_mdd\": float(meta_rows[\"mdd\"].min()),\n        },\n        {\n            \"engine\": \"branch5a\",\n            \"rows\": int(len(branch_rows)),\n            \"selection_basis\": \"recent10y_cagr\",\n            \"best_score\": float(branch_rows.iloc[0][\"selection_score\"]),\n            \"best_recent10y_score\": float(branch_rows.iloc[0][\"recent10y_selection_score\"]),\n            \"best_recent10y_cagr\": float(branch_rows.iloc[0][\"recent10y_cagr\"]),\n            \"best_recent10y_mdd\": float(branch_rows.iloc[0][\"recent10y_mdd\"]),\n            \"best_cagr\": float(branch_rows.iloc[0][\"cagr\"]),\n            \"best_mdd\": float(branch_rows.iloc[0][\"mdd\"]),\n            \"worst_mdd\": float(branch_rows[\"mdd\"].min()),\n        },\n        {\n            \"engine\": hybrid_name,\n            \"rows\": int(len(hybrid_candidates)),\n            \"selection_basis\": \"recent10y_cagr\",\n            \"best_score\": float(best_hybrid_row[\"selection_score\"]),\n            \"best_recent10y_score\": float(best_hybrid_row[\"recent10y_selection_score\"]),\n            \"best_recent10y_cagr\": float(best_hybrid_row[\"recent10y_cagr\"]),\n            \"best_recent10y_mdd\": float(best_hybrid_row[\"recent10y_mdd\"]),\n            \"best_cagr\": float(best_hybrid_row[\"cagr\"]),\n            \"best_mdd\": float(best_hybrid_row[\"mdd\"]),\n            \"worst_mdd\": float(hybrid_candidates[\"mdd\"].min()),\n        },\n'''); p.write_text(s, encoding='utf-8'); print('patched aggregate_results.py for recent10y_cagr selection')"

      - name: Download all shard artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: shard-*-${{ github.run_id }}
          merge-multiple: false

      - name: Download price artifact
        uses: actions/download-artifact@v4
        with:
          name: prices-${{ github.run_id }}
          path: data

      - name: Aggregate and build best folders
        run: |
          mkdir -p out/aggregate
          python scripts/aggregate_results.py \
            --input-dir artifacts \
            --out-dir out/aggregate \
            --prices-csv data/prices.csv \
            --meta-grid-yaml "${{ inputs.meta_grid_yaml }}" \
            --branch-grid-yaml "${{ inputs.branch_grid_yaml }}" \
            --execution-mode "${{ inputs.execution_mode }}" \
            --buy-cost "${{ inputs.buy_cost }}" \
            --sell-cost "${{ inputs.sell_cost }}" \
            --hybrid-core-weight "${{ inputs.hybrid_core_weight }}" \
            --hybrid-satellite-weight "${{ inputs.hybrid_satellite_weight }}" \
            --hybrid-meta-topn "10" \
            --hybrid-branch-topn "8" \
            --hybrid-rebalance-modes "always,month_end" \
            --hybrid-override-modes "none,meta_bear_crash_full"

      - name: Upload aggregate artifact
        uses: actions/upload-artifact@v4
        with:
          name: aggregate-${{ github.run_id }}
          if-no-files-found: error
          compression-level: 0
          path: out/aggregate/