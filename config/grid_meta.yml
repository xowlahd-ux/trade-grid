portfolio:
  - rebalance: weekly
    when: week_end
  - rebalance: biweekly
    when: week_end
  - rebalance: monthly
    when: week_end

state:
  - base_ticker: SPY
    ma_days: 150
    min_hold_days: 5
  - base_ticker: SPY
    ma_days: 200
    min_hold_days: 5

crash:
  - enabled: true
    lookback_days: 12
    threshold: -0.08
    fast:
      enabled: true
      lookback_days: 6
      threshold: -0.06
  - enabled: true
    lookback_days: 16
    threshold: -0.10
    fast:
      enabled: true
      lookback_days: 6
      threshold: -0.06

bear_fast:
  - enabled: true
    lookback_days: 4
    threshold: -0.045

trend_engine:
  - candidates: [QQQ, SPY, SOXX]
    mom_lookback_days: 84
    top_n: 1
    leverage_mode: mix_3x
  - candidates: [QQQ, SPY, SOXX]
    mom_lookback_days: 100
    top_n: 1
    leverage_mode: mix_3x
  - candidates: [QQQ, SPY, SOXX]
    mom_lookback_days: 100
    top_n: 2
    leverage_mode: mix_3x
  - candidates: [QQQ, SPY, SOXX]
    mom_lookback_days: 130
    top_n: 2
    leverage_mode: mix_3x

meanrev_engine:
  lookback_days: [20]
  drop_threshold: [-0.12]
  hold_days: [5]
  take_profit: [0.08]
  stop_loss: [-0.08]
  candidates:
    - [QQQ, SPY, SOXX]
  base: [SPY]

allocator:
  - bull:
      trend: 1.0
      meanrev: 0.0
      defensive: 0.0
    bear:
      trend: 0.0
      meanrev: 0.0
      defensive: 1.0
    crash:
      trend: 0.0
      meanrev: 0.0
      defensive: 1.0
  - bull:
      trend: 0.90
      meanrev: 0.0
      defensive: 0.10
    bear:
      trend: 0.0
      meanrev: 0.0
      defensive: 1.0
    crash:
      trend: 0.0
      meanrev: 0.0
      defensive: 1.0
  - bull:
      trend: 0.85
      meanrev: 0.0
      defensive: 0.15
    bear:
      trend: 0.20
      meanrev: 0.0
      defensive: 0.80
    crash:
      trend: 0.0
      meanrev: 0.0
      defensive: 1.0

risk_off:
  - mode: SGOV_100

soxx_gate:
  - enabled: true
    mode: mom
    mom_lookback_days: 20
    mom_threshold: 0.024
    ma_days: 50

asset_crash:
  - SPY:
      enabled: false
      lookback_days: 6
      threshold: -0.06
    QQQ:
      enabled: false
      lookback_days: 6
      threshold: -0.06
    SOXX:
      enabled: true
      lookback_days: 4
      threshold: -0.09
  - SPY:
      enabled: true
      lookback_days: 4
      threshold: -0.05
    QQQ:
      enabled: true
      lookback_days: 4
      threshold: -0.05
    SOXX:
      enabled: true
      lookback_days: 4
      threshold: -0.09

recovery_boost:
  - enabled: false
    dd_enter: -0.15
    qqq_ma_days: 20
    qqq_mom_days: 20
    from_assets: [SGOV_MIX]
    to_asset: TQQQ_MIX
  - enabled: true
    dd_enter: -0.15
    qqq_ma_days: 20
    qqq_mom_days: 20
    from_assets: [SGOV_MIX]
    to_asset: TQQQ_MIX

soxx_admission_filter:
  - enabled: false
    ret20_positive_required: true
    ret20_days: 20
    ma20_above_ma50_required: true
    ma20_days: 20
    ma50_days: 50
    replacement_if_blocked: SGOV_MIX
    apply_only_rank1: true
  - enabled: true
    ret20_positive_required: true
    ret20_days: 20
    ma20_above_ma50_required: true
    ma20_days: 20
    ma50_days: 50
    replacement_if_blocked: SGOV_MIX
    apply_only_rank1: true

sgov_exit_assist:
  - enabled: false
    apply_only_bull: true
    qqq_ma_days: 20
    spy_ma_days: 20
    require_positive_mom: true
  - enabled: true
    apply_only_bull: true
    qqq_ma_days: 20
    spy_ma_days: 20
    require_positive_mom: true

vol_targeting:
  - enabled: false
    lookback_days: 20
    target_annual_vol: 0.60
    min_scale: 1.00
    cash_asset: SGOV_MIX
    annualization: 252
  - enabled: true
    lookback_days: 20
    target_annual_vol: 0.55
    min_scale: 0.35
    cash_asset: SGOV_MIX
    annualization: 252
  - enabled: true
    lookback_days: 40
    target_annual_vol: 0.45
    min_scale: 0.30
    cash_asset: SGOV_MIX
    annualization: 252

costs:
  buy: [0.002]
  sell: [0.002]
